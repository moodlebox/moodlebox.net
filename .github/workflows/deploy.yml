name: Hugo CI & deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build and deploy website
    runs-on: ubuntu-latest
    steps:
      - name: Set environment vars
        id: hugo-release
        run: |
          if [ -f .hvm ]; then
            hvm_raw=$(cat .hvm)
            echo "HUGO_RELEASE="$(echo "${hvm_raw%/*}" | tr -d 'v') >> $GITHUB_ENV
            echo "HUGO_RELEASE=0.159.1" >> $GITHUB_ENV
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Print ENV var
        run: |
          echo "Hugo release is ${{ env.HUGO_RELEASE }}"
      - name: Download and setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_RELEASE }}
          extended: true
      - name: Check Hugo installation
        run: hugo env
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Run Node
        run: npm ci
      - name: Build website with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --printI18nWarnings \
            --cacheDir "${{ runner.temp }}/hugo_cache"
      - name: Deploy website with rsync
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --quiet --delete
          path: public/
          remote_path: ${{ secrets.DEPLOY_DIRECTORY }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
