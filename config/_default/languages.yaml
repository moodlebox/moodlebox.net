  params:
    title: MoodleBox
    slogan: A Moodle platform on Raspberry Pi
    description: MoodleBox is a standalone small and cheap mobile device working without Internet. It combines a wireless access point with a full featured Moodle server.
    about: |
      MoodleBox is a free project carried out in 🇨🇭 by [Nicolas Martignoni](https://blog.martignoni.net/a-propos/).

      MoodleBox™ is trademark of Moodle Pty Ltd.
    footertext: MoodleBox project is made by [Nicolas Martignoni](https://blog.martignoni.net/a-propos/)
    copyright: Copyright © 2016 onwards
    date_format: January 2, 2006

    testimonials:
      enable: true
      subtitle: Have a look at what users around the world said about the MoodleBox
      title: What users say

    clients:
      enable: true
      subtitle: NGO and organizations using MoodleBox for their own projects
      title: Our users

